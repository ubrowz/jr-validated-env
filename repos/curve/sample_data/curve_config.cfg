# jrc_curve_properties — sample config
# Force-compression test: loading then unloading arm
#
# Usage: jrc_curve_properties sample_data/curve_config.cfg
#        (run from repos/curve/ directory, or adjust paths accordingly)

[data]
file   = curvedata.csv # dit is een test
x_col  = Extension
y_col  = Load

[output]
label_x    = Displacement (mm)
label_y    = Force (N)
title      = Force-Compression Curve — Sample 01
plot       = yes
plot_file  = force_compression_plot.pdf

# en nog een test

[smoothing]
method        = none
apply_to_plot = yes

[phase.loading]
smooth_method = savgol
smooth_span = 0.5
search  = ascending
x_start = -3.5
x_end   = -2.5
auc     = yes
max_x   = yes
max_y   = yes

[phase.unloading]
smooth_method = savgol
smooth_span = 0.6
search  = descending
x_start = -1.7
x_end   = -2.4
auc = yes

[global]
max_y                      = yes
min_y                      = yes
max_x                      = yes
min_x                      = yes
hysteresis                 = yes
hysteresis_loading.phase   = loading
hysteresis_unloading.phase = unloading

[transform]
y_scale    = 0.1
y_offset_x = -3.4

[query]
y_at_x_1        = -3.4
y_at_x_1.show   = yes
y_at_x_1.phase  = loading
y_at_x_2        = -2.7
y_at_x_2.show   = no
y_at_x_2.phase  = loading
y_at_rel_x_1        = -3.5
y_at_rel_x_1.frac   = -0.1
y_at_rel_x_1.phase  = loading
y_at_rel_x_1.show   = yes
y_at_rel_x_2        = -3.5
y_at_rel_x_2.frac   = -0.2
y_at_rel_x_2.phase  = loading
y_at_rel_x_2.show   = yes

[debug]
d2y       = yes
d2y.phase = unloading

[transitions]
inflections_1              = yes
inflections_1.phase        = loading
inflections_1.plot_slope   = yes
inflections_1.min_gap      = 0.3
yield_1.slope              = 0.20
yield_1.phase              = loading
yield_1.show               = no
yield_2.slope              = 0.30
yield_2.phase              = unloading
yield_2.show               = no
